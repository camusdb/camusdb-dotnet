name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (8, 9, 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Start CamusDB
        # 5095 = REST/JSON API, 5096 = gRPC API (exercised by the Protocol=grpc transport tests).
        run: docker run -d -p 5095:5095 -p 5096:5096 -v camus-data:/data --name camusdb camusdb/camusdb:latest

      - name: Wait for CamusDB to be ready
        run: |
          for i in $(seq 1 60); do
            if curl --fail --silent http://localhost:5095/ping >/dev/null 2>&1; then
              echo "CamusDB is up after ${i}s."
              exit 0
            fi
            sleep 1
          done
          echo "CamusDB did not become ready in time." >&2
          docker logs camusdb || true
          exit 1

      - name: Wait for CamusDB gRPC port
        # The gRPC API speaks HTTP/2, not plain HTTP, so probe it with a raw TCP connect instead of curl.
        # A successful connect means Kestrel bound the gRPC listener (only happens when grpc_enabled), so
        # the Protocol=grpc tests fail fast here with a clear message rather than mid-suite.
        run: |
          for i in $(seq 1 60); do
            if timeout 1 bash -c '</dev/tcp/localhost/5096' 2>/dev/null; then
              echo "CamusDB gRPC port 5096 is accepting connections after ${i}s."
              exit 0
            fi
            sleep 1
          done
          echo "CamusDB gRPC port 5096 did not open in time." >&2
          docker logs camusdb || true
          exit 1

      - name: Create test database
        run: |
          curl --fail --silent -X POST http://localhost:5095/create-db \
            -H "Content-Type: application/json" \
            -d '{"databaseName":"test","ifNotExists":true}'

      - name: Restore
        run: dotnet restore CamusDB.Client/CamusDB.Client.sln

      - name: Build
        run: dotnet build CamusDB.Client/CamusDB.Client.sln --no-restore -c Release

      - name: Test
        # The suite talks to a single shared CamusDB instance; running test collections
        # serially avoids transient DDL/sequence contention between concurrent classes.
        run: >
          dotnet test CamusDB.Client/CamusDB.Client.sln
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          -- xUnit.ParallelizeTestCollections=false

      - name: Dump CamusDB logs on failure
        if: failure()
        run: docker logs camusdb || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

      - name: Stop CamusDB
        if: always()
        run: docker rm -f camusdb || true
